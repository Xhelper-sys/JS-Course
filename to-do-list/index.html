<!DOCTYPE html>
<html>
  <head>
    <title>
      To Do List
    </title>
    <style>
      body {
        font-family: Arial, Helvetica, sans-serif;
        background-color: rgb(46, 45, 45);
        color: white;
        font-size: 14px;
      }

      div > div {
        display: flex;
        flex-direction: row;
        margin: 10px 0px;
        column-gap: 10px;
        vertical-align: middle;
        align-items: center;
        width: 60%;
      }

      .button-statement {
        border: none;
        color: white;
        background-color: rgb(203, 39, 39);
        padding-top: 4px;
        padding-bottom: 2px;
        padding-left: 3px;
        padding-right: 3px;
        border-radius: 4px;
        font-size: 14px;
        cursor: pointer;
      }

      .en-cours{
        background-color: rgb(240, 222, 60);
      }

      .terminé {
        background-color: rgb(145, 212, 44);
      }

      .add-button {
        border: none;
        color: white;
        background-color: rgb(39, 96, 203);
        padding-top: 4px;
        padding-bottom: 2px;
        padding-left: 3px;
        padding-right: 3px;
        border-radius: 4px;
        font-size: 14px;
        cursor: pointer;
      }

      .remove-button{
        border: none;
        color: white;
        background-color: rgb(203, 53, 39);
        padding-top: 4px;
        padding-bottom: 2px;
        padding-left: 3px;
        padding-right: 3px;
        border-radius: 4px;
        font-size: 14px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <input type="text" placeholder="Task name" class="js-input">
    <button onclick="
      addTask();
    " class="add-button">
      Add a task
    </button>
    <button onclick="
      removeTask(infoTask.numberTask);
      numberTask -= 1;
    " class="remove-button">
      Remove task
    </button>
    <button onclick="
      removeAllTask();
    " class="remove-button">
      Remove all task
    </button>
    <div class="main-list">
      
    </div>
    <script>

      const infoTask = JSON.parse(localStorage.getItem('objetTask')) || {numberTask: 0, allTask: ''};
      
      document.querySelector('div').innerHTML = infoTask.allTask;


      function addTask() {
        infoTask.numberTask+=1;
        const divContainer = document.querySelector('div');
        const inputText = document.querySelector('.js-input');
        const textContentInput = inputText.value;
        if (textContentInput){
          divContainer.innerHTML += `
            <div class="js-task-${infoTask.numberTask}">
              <div class="left-section">
                <p>
                  ${textContentInput}
                </p>
              </div>
              <div class="right-section">
                <button class="js-button-statement-${infoTask.numberTask} button-statement" onclick="
                bouttonStatement(${infoTask.numberTask});">
                  Pas commencé
                </button>
              </div>
            </div>
          `;
        }
        inputText.value = '';
        saveInStorage();
      }
      function removeTask(numberTask) {
        if (numberTask <= 0){
          alert('Problème');
          return;
        }
        const lastTask = document.querySelector(`.js-task-${numberTask}`);
        console.log(lastTask);
        const divContainer = document.querySelector('div');
        divContainer.removeChild(lastTask);
        saveInStorage();
      }
      function removeAllTask(){
        const divContainer = document.querySelector('div');
        divContainer.innerHTML = '';
        infoTask.numberTask = 0;
        saveInStorage();
      }
      function bouttonStatement(numberButton){
        const buttonElement = document.querySelector(`.js-button-statement-${numberButton}`);
        if (buttonElement.innerText === 'Pas commencé'){
          buttonElement.innerText = 'En cours';
          buttonElement.classList.add('en-cours')
        } else if (buttonElement.innerText === 'En cours'){
          buttonElement.innerText = 'Terminé';
          buttonElement.classList.remove('en-cours')
          buttonElement.classList.add('terminé')
        } else {
          buttonElement.innerText = 'Pas commencé'
          buttonElement.classList.remove('terminé')
        }
        saveInStorage();
      }
      function saveInStorage(){
        infoTask.allTask = document.querySelector('div').innerHTML;
        localStorage.setItem('objetTask', JSON.stringify(infoTask));
      };
    </script>
  </body>
</html>
