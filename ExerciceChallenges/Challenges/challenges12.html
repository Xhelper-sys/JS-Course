<!DOCTYPE html>
<html>
  <head>
    <title>
      Challenge Exercises 12
    </title>
  </head>
  <body>
    <button class="js-button-12g">
      Add to cart
    </button>

    <p></p>
    <button class="js-add-button">
      Add
    </button>
    <button class="js-remove-button">
      Remove
    </button>
    <p class="js-text-12e"></p>
    <script>
      let idTimeout;
      let messages = 2;

      let idInterval;
      let run = true;

      document.querySelector('.js-button-12g').addEventListener('click', ()=>{
        const text = document.querySelector('.js-text-12e');
        text.innerText = 'Added';
        idTimeout ? clearTimeout(idTimeout) : 0;
        idTimeout = setTimeout(function (){text.innerText = '';
        },2000);
      });

      document.querySelector('.js-add-button').addEventListener('click',() => {
        messages++;
        displayTitle();
      });

      document.querySelector('.js-remove-button').addEventListener('click',() => {
        if (messages > 0){
          messages--;
        }
        displayTitle();
      });

      // 12g.
      // 12h.
      idInterval = setInterval(function (){
        document.title = `(${messages})New messages`
      }, 1000);

      // 12i.
      function displayTitle(){
        if (!run){
          idInterval = setInterval(function (){
            document.title = `(${messages})New messages`
          }, 1000);
          run = true;
        } else if (messages === 0) {
          if (idInterval){
            clearInterval(idInterval);
          }
          document.title = 'App';
          run = false
        }
      }
    </script>
  </body>
</html>
