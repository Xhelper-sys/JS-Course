<!DOCTYPE html>
<html>
  <head>
    <title>
      Challenges Exercises 8
    </title>
  </head>
  <body>
    <button onclick="
      playGame('heads');     
    ">
      heads
    </button>
    <button onclick="
      playGame('tails');
    ">
      tails
    </button>
    <script>
      const score = JSON.parse(localStorage.getItem('score')) || {wins: 0, losses: 0};

      function playGame(guess){
        const randomNumber = Math.random();
        let result = randomNumber < 0.5 ? 'heads' : 'tails';

        if (result === guess ){
          score.wins += 1;
          console.log(`You win! (wins: ${score.wins}, losses: ${score.losses})`);
        } else {
          score.losses += 1;
          console.log(`You lose! (wins: ${score.wins}, losses: ${score.losses})`);
        }
        localStorage.setItem('score', JSON.stringify(score));
      }
    </script>
  </body>
</html>
