<!DOCTYPE html>
<html>
  <head>
    <title>
      DOM Projects
    </title>
  </head>
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
    }

    .subscribe-button {
      background-color: black;
      border: none;
      color: white;
      padding-top: 10px;
      padding-bottom: 10px;
      padding-left: 15px;
      padding-right: 15px;
      font-weight: bold;
      border-radius: 100px;
      cursor: pointer;
      margin-bottom: 30px;
    }
 
    .is-subscribed {
      background-color: rgb(240, 240, 240);
      color: black;
    }

    .cost-input {
      font-size: 16px;
      /*
      padding-top: 10px;
      padding-bottom: 10px;
      padding-right: 10px;
      padding-left: 10px;
      */
      padding: 10px;
    }

    .calculate-button{
      padding: 12px 15px;
      color: white;
      background-color: green;
      border: none;
      font-size: 15px;
      cursor: pointer;
      margin-bottom: 30px;
    }

    .warning {
      color: red;
    }
  </style>
  <body>
    <p>YouTube Subscribe Button</p>
    <button onclick="
      subscribe()
      " class="js-subscribe-button subscribe-button">
      Subscribe
    </button>

    <p>
      Amazon Shipping Calculator
    </p>
    <p>
      Orders under $40 = +$10 shipping.
    </p>
    <p>
      Orders over $40 = FREE shipping.
    </p>
    <input class="js-cost-input cost-input" type="text" placeholder="Cost of order" onkeydown="
      handleCostKeydown(event);
    ">
    <button onclick="
      calculateTotal();
    " class="calculate-button">
      Calculate
    </button>
    <p class="js-total-cost"></p>

    <p>
      Rock Paper Scissors
    </p>
    <a href="./">
      Click here
    </a>
    <script>
      String(25);
      console.log('25' - 5);
      console.log('25' + 5);


      window.document
      window.console.log('window');
      window.alert


      function handleCostKeydown(event){
        if (event.key === 'Enter'){
          calculateTotal();
        };
      }


      function calculateTotal(){
        const inputElement = document.querySelector('.js-cost-input');
        let cost = Number(inputElement.value);

        if (cost < 0){
          document.querySelector('.js-total-cost').innerHTML = 'Error: cost cannot be less than $0';
          document.querySelector('.js-total-cost').classList.add('warning');
          return;
        }

        if (document.querySelector('.js-total-cost').classList.contains('warning')) {
          document.querySelector('.js-total-cost').classList.remove('warning');
        }


        if (cost < 40) {
          cost += 10;
        }

        document.querySelector('.js-total-cost').innerHTML = `$${cost}`
      }


      function subscribe() {
        const buttonElement = document.querySelector('.js-subscribe-button');

        if (buttonElement.innerText === 'Subscribe') {
          buttonElement.innerHTML = 'Subscribed';
          buttonElement.classList.add('is-subscribed');
        } else {
          buttonElement.innerHTML = 'Subscribe';
          buttonElement.classList.remove('is-subscribed');
        }
      }
    </script>
  </body>
</html>
