<!DOCTYPE html>
<html>
  <head>
    <title>
      Exercice 9
    </title>
  </head>
  <body>
    <button>
      9a
    </button>
    <button class="js-9b">
      9b
    </button>

    <p></p>

    <button onclick="
      pickFace('heads')
    ">
      heads
    </button>
    <button onclick="
      pickFace('tails');
    ">
      tails
    </button>
    <p class="js-pick"></p>

    <p></p>

    <input type="text" placeholder="Name" class="js-9d" onkeydown="
      if (event.key === 'Enter'){
        displayName();
      }
    ">
    <button onclick="
      displayName();
    ">
      Submit
    </button>
    <p class="js-name-input"></p>
    <script>
      // 9a.
      console.log(document.querySelector('button'));

      // 9b.
      document.querySelector('.js-9b').innerText = '9b done!';

      // 9c.
      function pickFace(choice) {
        const choicePick = document.querySelector('.js-pick');
        choicePick.innerText = `You chose: ${choice}`
      }

      // 9d.
      function displayName(){
        const contentInput = document.querySelector('.js-9d').value;
        const textDisplay = document.querySelector('.js-name-input');
        textDisplay.innerText = `You name is: ${contentInput}`;
      }

    </script>
  </body>
</html>
