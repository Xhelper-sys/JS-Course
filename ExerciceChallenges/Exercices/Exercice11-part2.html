      function findIndex(array, word){
        for (let i = 0; i < array.length; i++){
          if (array[i] === word){

          }
        }

      }

      function removeEgg(foods){
        const copieFoods = foods.splice();
        copieFoods.reverse();
        cpt = 0;
        const newArray = [];
        for (let i = 0; i<copieFoods.length; i++){
          if (foods[i] === 'egg'){
            cpt++;
            if (cpt < 3){
              continue;
            }
          } 
          newArray.push(copieFoods[i]);
        }
        return newArray.reverse();
      }
      const foodTable = ['egg', 'apple', 'egg', 'egg', 'ham'];
      console.log(foodTable);
      console.log(removeEgg(foodTable));
