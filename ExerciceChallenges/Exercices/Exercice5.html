<!DOCTYPE html> 
<html>
  <head>
    <title>
      Lesson 5 Exercises - Variables
    </title>
  </head>
  <body>
    <script>
      // 5a.
      const name = 'Mustafa';
      // 5b.
      console.log(`My name is: ${name}`);
      // 5c.
      const cost = 5 + 2 * 3 + 9;
      // 5d.
      console.log(`Cost of food: $${cost}`);
      // 5e.
      const tax = cost * 0.10;
      // 5f.
      console.log(`Tax (10%): $${tax}`);
      // 5g.
      const totalCost = tax + cost;
      console.log(`Total cost: $${totalCost}`);
    </script>
  </body>
</html>
