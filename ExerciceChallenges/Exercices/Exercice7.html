<!DOCTYPE html>
<html>
  <head>
    <title>
      Lesson 7 Exercises - Functions
    </title>
  </head>
  <body>
    <script>
      // 7a. 7b. 7c.
      function greet(name){
        (name) ? console.log(`Hello ${name}!`) : console.log('Hi there!');
      };
      greet('Mustafa');
      greet('Simon');
      greet();

      // 7d.
      function convertToFahrenheit(celsius){
        const fahrenheit = (celsius * 9/5) + 32;
        return fahrenheit;
      };
      console.log(convertToFahrenheit(25));

      // 7e.
      function convertToCelsius(fahrenheit){
        const celsius = (fahrenheit - 32) * 5/9;
        return celsius;
      }
      console.log(convertToCelsius(86));

      // 7f.
      function convertTemperature(degrees, unit){
        if (unit === 'C'){
          const fahrenheitConvert = convertToFahrenheit(degrees);
          const fahrenheitConvertText = `${fahrenheitConvert}F`;
          return fahrenheitConvertText
        } else {
          const celsiusConvert = convertToCelsius(degrees);
          const celsiusConvertText = `${celsiusConvert}C`
          return celsiusConvertText;
        }
      }
      console.log(convertTemperature(25, 'C'));
      console.log(convertTemperature(86, 'F'));

      // 7g. 7h. 7i.
      function convertLength(length, from, to){
        let newLengthText = '';
        if (from === 'miles' && to === 'km'){
          newLengthText = `${length * 1.6} km`;
          return newLengthText
        } else if (from === 'km' && to === 'miles'){
          newLengthText = `${length * 1/(1.6)} miles`;
          return newLengthText
        } else if (from === 'ft' && to === 'miles'){
          newLengthText = `${length * 1/5280} miles`;
          return newLengthText;
        } else if (from === 'ft' && to === 'km'){
          newLengthText = `${length * 1/3281} km`;
          return newLengthText;
        } else if (from === 'km' && to === 'ft'){
          newLengthText = `${length * 3281} ft`;
          return newLengthText;
        } else if (from === 'miles' && to === 'ft'){
          newLengthText = `${length * 5280} ft`
          return newLengthText;
        } else if (from ===  to && (to === 'ft' || to === 'km' || to === 'miles')){
          newLengthText = `${length} ${to}`;
          return newLengthText;
        } else {
          if (!(from === 'km' || from === 'miles' || from === 'ft')){
            return `Invalid unit: ${from}`;
          } else {
            return `Invalid unit: ${to}`;
          }
        }
      }


      console.log(convertLength(50, 'miles', 'km'));
      console.log(convertLength(32, 'km', 'miles'));
      console.log(convertLength(50, 'km', 'km'));

      console.log(convertLength(5, 'miles', 'km'));
      console.log(convertLength(5, 'miles', 'ft'));
      console.log(convertLength(5, 'km', 'ft'));

      console.log(convertLength(5, 'lbs', 'lbs'));
    </script>
  </body>
</html>
