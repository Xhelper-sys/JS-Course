<!DOCTYPE html>
<html>
  <head>
    <title>
      Cart Quantity
    </title>
    <style></style>
  </head>
  <body>
    <p>
      Cart Quantity
    </p>
    <button onclick="
      console.log(`Cart quantity: ${cartQuantity}`);
    ">
      Show Quantity
    </button>
    <button onclick="
      updateCartQuantity(1);
    ">
      Add to Cart
    </button>
    <button onclick="
      updateCartQuantity(2);
    ">
      +2
    </button>
    <button onclick="
      updateCartQuantity(3);
    ">
      +3
    </button>
    <button onclick="
      updateCartQuantity(4);
    ">
      +4
    </button>
    <button onclick="
      updateCartQuantity(5);
    ">
      +5
    </button>
    <button onclick="
      updateCartQuantity(-1);
    ">
      -1
    </button>
    <button onclick="
      updateCartQuantity(-2);
    ">
      -2
    </button>
    <button onclick="
      updateCartQuantity(-3);
    ">
      -3
    </button>
    <button onclick="
      cartQuantity = 0;
      console.log('Cart Was reset.');  
      console.log(`Cart quantity: ${cartQuantity}`);
    ">
      Reset Cart
  </button>

    <script>
      let cartQuantity = 0;
      function updateCartQuantity(number){
        if (number >= 0){
          if (cartQuantity + number > 10){
            alert('The cart is full');
            return;
          };
          cartQuantity += number;
          console.log(`Cart quantity: ${cartQuantity}`);
        } else {
          if (cartQuantity + (number) < 0){
            alert('Not enough items in the cart');
            return;
          };
          cartQuantity -= (number * (-1));
          console.log(`Cart quantity: ${cartQuantity}`);
        }
      }
    </script>
  </body>
</html>
