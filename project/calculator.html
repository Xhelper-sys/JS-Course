<!DOCTYPE html>
<html>
  <head>
    <title>
      Calculator
    </title>
  </head>
  <link rel="stylesheet" href="./css/calculator.css">
  <body>
    <p class="js-display-calcul display-calcul"></p>
    <p>
      <button class="button-center" onclick="
        updateCalculation('1');
      ">
        1
      </button>
      <button class="button-center" onclick="
        updateCalculation('2');
      ">
        2
      </button>
      <button class="button-center" onclick="
        updateCalculation('3');
      ">
        3
      </button>
      <button class="button-right" onclick="
        updateCalculation(' + ');
      ">
        +
      </button>
    </p>
    <p>
      <button class="button-center" onclick="
        updateCalculation('4');
      ">
        4
      </button>
      <button class="button-center" onclick="
        updateCalculation('5');
      ">
        5
      </button>
      <button class="button-center" onclick="
        updateCalculation('6');
      ">
        6
      </button>
      <button class="button-right" onclick="
        updateCalculation(' - ');
      ">
        -
      </button>
    </p>
    <p>
      <button class="button-center" onclick="
        updateCalculation('7');
      ">
        7
      </button>
      <button class="button-center" onclick="
        updateCalculation('8');
      ">
        8
      </button>
      <button class="button-center" onclick="
        updateCalculation('9');
      ">
        9
      </button>
      <button class="button-right" onclick="
        updateCalculation(' * ');
      ">
        *
      </button>
    </p>
    <p>
      <button class="button-center" onclick="
        updateCalculation('0');
      ">
        0
      </button>
      <button class="button-center" onclick="
        updateCalculation('.');
      ">
        .
      </button>
      <button class="button-center" onclick="
        updateCalculation('=');
      ">
        =
      </button>
      <button class="button-right" onclick="
        updateCalculation(' / ');
      ">
        /
      </button>
    </p>
    <button class="button-clear" onclick="
      updateCalculation('clear');
    ">
      Clear
    </button>
    <script src="./script/calculator.js"></script>
  </body>
</html>
